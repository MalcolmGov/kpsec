<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1A1A" />
      <stop offset="100%" stop-color="#B30000" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#888888" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer speed ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#1A1A1A" stroke-width="2" />
  
  <!-- Red tachometer sweep -->
  <path d="M 6.1 26 A 14 14 0 1 1 25.9 26" fill="none" stroke="url(#redGrad)" stroke-width="2.5" stroke-dasharray="70 20" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Speed ticks -->
  <line x1="16" y1="2" x2="16" y2="4" stroke="#444444" stroke-width="1.5" />
  <line x1="30" y1="16" x2="28" y2="16" stroke="#444444" stroke-width="1.5" />
  <line x1="2" y1="16" x2="4" y2="16" stroke="#444444" stroke-width="1.5" />
  
  <!-- Stylized Tuning "K" Logo -->
  <path d="M 10 7 L 10 25 M 10 16 L 19 7 M 13.5 12.5 L 21 25" stroke="url(#silverGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Red dial needle pointing to maximum speed (redline) -->
  <line x1="16" y1="16" x2="25.5" y2="8" stroke="#E10600" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
  <circle cx="16" cy="16" r="3" fill="#E10600" />
  <circle cx="16" cy="16" r="1" fill="#FFFFFF" />
</svg>
